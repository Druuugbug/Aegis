name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.asset }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            asset: linux-x86_64
          - target: aarch64-unknown-linux-musl
            asset: linux-aarch64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        run: cross build --release --locked --bin aegis --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf aegis-${{ matrix.asset }}.tar.gz aegis
          sha256sum aegis-${{ matrix.asset }}.tar.gz > aegis-${{ matrix.asset }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: aegis-${{ matrix.asset }}
          path: |
            target/${{ matrix.target }}/release/aegis-${{ matrix.asset }}.tar.gz
            target/${{ matrix.target }}/release/aegis-${{ matrix.asset }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
